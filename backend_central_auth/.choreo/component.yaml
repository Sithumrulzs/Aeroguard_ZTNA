apiVersion: core.choreo.dev/v1
kind: Component
metadata:
  name: backend-central-auth
  description: AeroGuard ZTNA Central Auth Service
spec:
  displayName: AeroGuard Central Auth
  type: service
  source:
    repository:
      url: https://github.com/Sithumrulzs/backend_central_auth.git
      ref: main
      context: .
  build:
    dockerfile: Dockerfile
    context: .
  healthCheck:
    type: http
    endpoint: /health
    initialDelaySeconds: 10
    periodSeconds: 15
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
