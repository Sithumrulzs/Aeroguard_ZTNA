apiVersion: core.choreo.dev/v1
kind: Component
metadata:
  name: backend-central-auth
  description: AeroGuard ZTNA Central Auth Service
spec:
  displayName: AeroGuard Central Auth
  type: service
  source:
    git:
      url: https://github.com/Sithumrulzs/backend_central_auth.git
      ref: main
      context: .
  build:
    language: python
    version: 3.11.x
    path: .
    commands:
      - python -m pip install --no-cache-dir -r requirements.txt
  run:
    command:
      - python
      - -m
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
  healthCheck:
    type: http
    endpoint: /health
    initialDelaySeconds: 10
    periodSeconds: 15
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m
